<div class="kanban-card" id="order-{{ order.id }}" draggable="true" data-id="{{ order.id }}">
    <div class="card-body">
        <h4 class="card-title">{{ order.title }}</h4>
        <p class="card-desc">{{ order.description|truncatechars:120 }}</p>

        <div class="card-footer">
            <div class="card-files">
                {% if order.document %}
                <a href="{{ order.document.url }}" target="_blank" class="file-link doc" title="Открыть документ">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    <span>DOC</span>
                </a>
                {% endif %}

                {% if order.image %}
                <a href="{{ order.image.url }}" target="_blank" class="file-link img" title="Просмотреть изображение">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    <span>IMG</span>
                </a>
                {% endif %}
            </div>

            <div class="card-date">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                {{ order.created_at|date:"d M" }}
            </div>
        </div>
    </div>

    <a href="{% url 'dashboard_active_order_delete' order.pk %}" class="card-delete-btn"
        onclick="return confirm('Удалить этот заказ?');">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </a>
</div>
