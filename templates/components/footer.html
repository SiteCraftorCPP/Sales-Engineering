<script>
    document.addEventListener('DOMContentLoaded', () => {
        const brandLetters = document.querySelectorAll('.brand-letters span');
        const footer = document.querySelector('.footer-mega');

        const updateGravity = () => {
            const footerRect = footer.getBoundingClientRect();
            const windowHeight = window.innerHeight;

            // Начинаем эффект, когда футер появляется в зоне видимости
            if (footerRect.top < windowHeight) {
                // Вычисляем прогресс появления футера (от 0 до 1)
                const distanceToBottom = document.documentElement.scrollHeight - (window.pageYOffset + windowHeight);
                // Если мы в самом низу, progress = 1. Если футер только показался, progress = 0.
                const progress = Math.max(0, Math.min(1, 1 - (distanceToBottom / 300)));

                brandLetters.forEach((letter, index) => {
                    // Разные коэффициенты для каждой буквы (первая улетает выше всех)
                    const baseOffset = (brandLetters.length - index) * 60;
                    const currentOffset = baseOffset * (1 - progress);

                    letter.style.transform = `translateY(${currentOffset}px)`;
                    letter.style.opacity = 0.3 + (progress * 0.7);
                });
            }
        };

        window.addEventListener('scroll', updateGravity, { passive: true });
        updateGravity();
    });
</script>
