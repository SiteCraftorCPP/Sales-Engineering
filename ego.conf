server {
    listen 80;
    server_name 79.174.77.62 salesengineering.ru www.salesengineering.ru;

    # Статика: 1 год для версионированных файлов, 30 дней для остальных
    location /static/ {
        alias /var/www/EGOstudio/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        
        # Принудительная gzip для CSS/JS
        location ~* \.(css|js)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            gzip_static on;
        }
        
        # Изображения: WebP предпочтительнее
        location ~* \.(webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        
        # Видео: долгий кэш
        location ~* \.(webm|mp4)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000";
        }
    }

    location /media/ {
        alias /var/www/EGOstudio/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Vary "Accept-Encoding";
        access_log off;
        
        # WebP изображения
        location ~* \.(webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000";
        }
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # Безопасность
    location ~ /\. { deny all; }
    location ~* \.(py|sh|env|conf|sqlite3)$ { deny all; }
}
